<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Profil de Jean</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <div class="profile-card">
        <h1>Profil de Jean</h1>
        
        <div class="photo-container">
            <img src="profil.jpg" alt="Photo de profil" id="profile-pic">
        </div>

        <form>
            <div class="input-group">
                <label>Nom :</label>
                <input type="text" value="DUPONT" >
            </div>

            <div class="input-group">
                <label>Prénom :</label>
                <input type="text" value="Jean">
            </div>

            <div class="input-group">
                <label>Âge :</label>
                <input type="number" value="30">
            </div>

            <div class="input-group">
                <label>Date de naissance :</label>
                <input type="date" value=" 1995-10-27">
            </div>

            <div class="input-groupe">
                <label>Adresse :</label>
                <input type="texte" value="Rue des tulipes">
            </div>

            <div class="input-groupe">
                <label> Numéro </label>
                <input type="texte" value="12">
            </div>

            
            <div class="input-groupe">
                <label> Code postale </label>
                <input type="texte" value="1000">
            </div>

            
            <div class="input-groupe">
                <label> Ville </label>
                <input type="texte" value="Bruxelles">
            </div>

            
            <div class="input-groupe">
                <label> Pays </label>
                <input type="texte" value="Belgique">
            </div>



            <div class="input-group">
                <label>Sport favori :</label>
                <select>
                    <option>Luge</option>
                    <option>Patinage artistique</option>
                    <option>Bobsleigh</option>
                    <option>Ski nordique</option>
                    <option>Skeleton</option>
                </select>
            </div>

            <button type="submit">Enregistrer le profil</button>
        </form>
    </div>

</body>
</html>
