<!DOCTYPE html>
<html lang="fr">
    <head>
        <title>Page Utilisateur – JO 2026</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1 " />
        <meta name="author" content="Amal Zemmouri" />
        <link rel="stylesheet" href="assets/css/main.css" />
        <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
    </head>
    <body>

            <div class="profile-card">
                <h1>Profil de Jean</h1>
                
                <div class="photo-container">
                    <img src="profil.jpg" alt="Photo de profil" id="profile-pic">
                </div>

                <form>
                    <div class="input-group">
                        <label>Nom :</label>
                        <input type="text" value="DUPONT" >
                    </div>

                    <div class="input-group">
                        <label>Prénom :</label>
                        <input type="text" value="Jean">
                    </div>

                    <div class="input-group">
                        <label>Âge :</label>
                        <input type="number" value="30">
                    </div>

                    <div class="input-group">
                        <label>Date de naissance :</label>
                        <input type="date" value=" 1995-10-27">
                    </div>

                    <div class="input-groupe">
                        <label>Adresse :</label>
                        <input type="texte" value="Rue des tulipes">
                    </div>

                    <div class="input-groupe">
                        <label> Numéro </label>
                        <input type="texte" value="12">
                    </div>

                    
                    <div class="input-groupe">
                        <label> Code postale </label>
                        <input type="texte" value="1000">
                    </div>

                    
                    <div class="input-groupe">
                        <label> Ville </label>
                        <input type="texte" value="Bruxelles">
                    </div>

                    
                    <div class="input-groupe">
                        <label> Pays </label>
                        <input type="texte" value="Belgique">
                    </div>



                    <div class="input-group">
                        <label>Sport favori :</label>
                        <select>
                            <option>Luge</option>
                            <option>Patinage artistique</option>
                            <option>Bobsleigh</option>
                            <option>Ski nordique</option>
                            <option>Skeleton</option>
                        </select>
                    </div>

                    <button type="submit">Enregistrer le profil</button>
                </form>
            </div>
        <!-- Footer -->
        <footer id="footer">
            <ul class="icons">
                <li><a href="#" class="icon brands fa-twitter"><span class="label">Twitter</span></a></li>
                <li><a href="#" class="icon brands fa-facebook-f"><span class="label">Facebook</span></a></li>
                <li><a href="#" class="icon brands fa-instagram"><span class="label">Instagram</span></a></li>
                <li><a href="#" class="icon solid fa-envelope"><span class="label">Email</span></a></li>
            </ul>
            <ul class="copyright">
                <li>&copy; JO 2026</li><li>Design: <a href="http://html5up.net">HTML5 UP</a></li>
            </ul>
        </footer>
        </div>
        <!-- Scripts -->
        <script src="assets/js/jquery.min.js"></script>
        <script src="assets/js/jquery.scrollex.min.js"></script>
        <script src="assets/js/jquery.scrolly.min.js"></script>
        <script src="assets/js/browser.min.js"></script>
        <script src="assets/js/breakpoints.min.js"></script>
        <script src="assets/js/util.js"></script>
        <script src="assets/js/main.js"></script>
    </body>
</html>
